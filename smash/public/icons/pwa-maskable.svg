<!-- ABOUTME: Defines the maskable app icon using the SSBU Palutena stock icon artwork. -->
<!-- ABOUTME: Places the pixel-preserved stock icon inside a padded safe zone for install surfaces. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Palutena stock logo maskable icon">
  <rect width="512" height="512" fill="#1f2b26" />
  <rect x="40" y="40" width="432" height="432" rx="96" fill="#f6efe3" />
  <image
    href="data:image/png;base64,"
    x="64"
    y="64"
    width="384"
    height="384"
    image-rendering="pixelated"
    preserveAspectRatio="xMidYMid meet"
  />
</svg>
